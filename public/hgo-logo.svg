<svg viewBox="0 0 120 80" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond -->
  <rect width="120" height="80" rx="14" fill="#050A14"/>

  <!-- Lignes circuit imprimé -->
  <!-- Ligne verticale principale -->
  <line x1="28" y1="6" x2="28" y2="74" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.55"/>

  <!-- Branches horizontales -->
  <line x1="28" y1="14" x2="6" y2="14" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.45"/>
  <circle cx="5" cy="14" r="2" fill="#00E5FF" fill-opacity="0.65"/>

  <line x1="28" y1="24" x2="12" y2="24" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="12" y1="24" x2="12" y2="30" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="12" cy="31" r="2" fill="#00E5FF" fill-opacity="0.5"/>

  <line x1="28" y1="36" x2="4" y2="36" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.55"/>
  <circle cx="3" cy="36" r="2.2" fill="#00E5FF" fill-opacity="0.8"/>

  <line x1="28" y1="48" x2="16" y2="48" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="16" y1="48" x2="16" y2="54" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="16" cy="55" r="1.8" fill="#00E5FF" fill-opacity="0.45"/>

  <line x1="28" y1="58" x2="7" y2="58" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="6" cy="58" r="2" fill="#00E5FF" fill-opacity="0.55"/>

  <line x1="28" y1="68" x2="14" y2="68" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="13" cy="68" r="1.5" fill="#00E5FF" fill-opacity="0.4"/>

  <!-- Dots sur ligne principale -->
  <circle cx="28" cy="36" r="2.5" fill="#00E5FF" fill-opacity="0.9"/>
  <circle cx="28" cy="14" r="2" fill="#00E5FF" fill-opacity="0.6"/>
  <circle cx="28" cy="58" r="2" fill="#00E5FF" fill-opacity="0.5"/>

  <!-- Texte HGO -->
  <text x="38" y="52"
    font-family="Sora, Arial, sans-serif"
    font-weight="800"
    font-size="36"
    fill="#00E5FF"
    letter-spacing="-1.5"
    style="text-shadow: 0 0 20px rgba(0,229,255,0.6)"
  >HGO</text>

  <!-- Sous-titre AUTOMATION -->
  <text x="40" y="64"
    font-family="Sora, Arial, sans-serif"
    font-weight="300"
    font-size="9"
    fill="rgba(255,255,255,0.5)"
    letter-spacing="3.5"
  >AUTOMATION</text>
