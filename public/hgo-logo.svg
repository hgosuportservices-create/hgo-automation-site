<svg viewBox="0 0 100 100" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#050D1F"/>
    </linearGradient>
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#0099CC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond carré arrondi -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Bordure subtile cyan -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Lettre H bold centrée -->
  <g filter="url(#glow)">
    <!-- Barre gauche du H -->
    <rect x="18" y="22" width="14" height="56" rx="3" fill="url(#hGrad)"/>
    <!-- Barre droite du H -->
    <rect x="68" y="22" width="14" height="56" rx="3" fill="url(#hGrad)"/>
    <!-- Barre horizontale du H -->
    <rect x="18" y="43" width="64" height="14" rx="3" fill="url(#hGrad)"/>
  </g>

  <!-- 3 points circuit en bas à droite -->
  <circle cx="76" cy="84" r="3.5" fill="#00E5FF" fill-opacity="0.9"/>
  <circle cx="86" cy="84" r="2.5" fill="#00E5FF" fill-opacity="0.6"/>
  <circle cx="66" cy="84" r="2" fill="#00E5FF" fill-opacity="0.4"/>
  <line x1="66" y1="84" x2="86" y2="84" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Petit point coin haut droit -->
  <circle cx="86" cy="14" r="3" fill="#00E5FF" fill-opacity="0.5"/>
  <line x1="86" y1="14" x2="86" y2="22" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.3"/>
</svg>
